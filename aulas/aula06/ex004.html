<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 04</title>
    <style>
        body {
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt("Digite seu nome:");
        document.write(`Olá, seu nome é <strong>${nome}</strong>, e tem ${nome.length} letras.<br>`);
        document.write(`O seu nome em maiúsculas é ${nome.toUpperCase()}.<br>`);
        document.write(`O seu nome em minúsculas é ${nome.toLowerCase()}.<br>`);
        var sal = Number(window.prompt("Digite seu salário em BRL:"));
        
        document.writeln(`Em doláres se escreve ${sal.toLocaleString('en-US', {style: 'currency', 'currency': 'USD'})}.`);
        document.writeln(`Em euros se escreve ${sal.toLocaleString('de-DE', {style: 'currency', 'currency': 'EUR'})}.`);    


    </script>
</body>
</html>
