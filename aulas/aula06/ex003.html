<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 03</title>

    <style>
        body {
            background-color: black;
            font: normal 16px Arial, sans-serif;
            color: white;
        }

        h1{
            color: gold
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo</h1> 
    <p>Exercício 03</p>
    <script>
        var n1 = Number(window.prompt("Digite um número:")); //Caixa de prompt para o usuário digitar algo
        var n2 = Number(window.prompt("Digite outro número:"));
        var resultado = n1 + n2; //Convertendo as strings para números e somando
        window.alert(`O resultado da soma é: ${resultado}`);
    </script>
</body>
