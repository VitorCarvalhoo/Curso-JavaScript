<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 07</title>

    <link rel="shortcut icon" href="../../favicon.ico" type="image/x-icon">

    <style>
        body {
            background-color: rgb(90, 154, 184);
            color: white;
            font: normal 20pt Arial;
        }

        input {
            font-size: 15pt;
            width: 100px;
        }
        div#res {
            margin-top: 20px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="txtn1" id="txtn1" placeholder="Digite um número"> +
    <input type="number" name="txtn2" id="txtn2" placeholder="Digite outro número">
    <input type="button" value="Somar" onclick="somar()">
    <div id="res">Resultado</div>

    <script>
        function somar() {
            let txt1 = window.document.getElementById('txtn1');
            let txt2 = window.document.getElementById('txtn2');
            let res = window.document.getElementById('res');
            let n1 = Number(txt1.value);
            let n2 = Number(txt2.value);
            let resultado = n1 + n2;

            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong>${resultado}</strong>`;
        }
    </script>
</body>
</html>
